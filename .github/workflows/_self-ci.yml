name: Self CI

# CI interne de pivot-cicd (US05.17.1) : valide les workflows/actions hébergés ici.
# Sans action tierce (actionlint/yamllint installés en ligne de commande) pour rester
# indépendant des sources d'actions autorisées Plumber.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Lint workflows (actionlint + yamllint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install and run actionlint
        run: |
          curl -sSfL -o download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash
          ./actionlint -color

      - name: Install and run yamllint
        run: |
          pipx install yamllint
          yamllint --version
          yamllint -c .yamllint .github/ .plumber.yaml
